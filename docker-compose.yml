version: '3.8'

services:
  # Go API Server (SML Fleet)
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: smlfleet-api
    ports:
      - "8082:8080"
    networks:
      - smlfleet
      - bcfleet_bcfleet
    env_file:
      - .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: ["./api"]
    restart: unless-stopped

  # Kafka Consumer (MongoDB → PostgreSQL sync)
  kafka-consumer:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: smlfleet-kafka-consumer
    networks:
      - smlfleet
      - bcfleet_bcfleet
    env_file:
      - .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: ["./kafka-consumer"]
    restart: unless-stopped

  # Call Center (Next.js)
  callcenter:
    build:
      context: ./callcenter
      dockerfile: Dockerfile
    container_name: smlfleet-callcenter
    ports:
      - "3001:3000"
    networks:
      - smlfleet
    environment:
      - NEXT_PUBLIC_API_URL=http://smlfleet-api:8080
    restart: unless-stopped

networks:
  smlfleet:
    driver: bridge
  bcfleet_bcfleet:
    external: true
